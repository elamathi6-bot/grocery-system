<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Grocery Management System</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body>
  <nav class="navbar navbar-expand-lg navbar-dark bg-success">
    <div class="container">
      <a class="navbar-brand fw-bold" href="/">XYZ Grocers</a>
      <div class="navbar-nav me-auto">
        <a class="nav-link" href="/inventory/">Inventory</a>
        <a class="nav-link" href="/orders/">Orders</a>
        <a class="nav-link" href="/suppliers/">Suppliers</a>
        <a class="nav-link" href="/dashboard/">Dashboard</a>
      </div>
      <div class="navbar-nav me-3">
        <div class="dropdown">
          <a class="nav-link dropdown-toggle text-white" href="#" data-bs-toggle="dropdown">Export</a>
          <ul class="dropdown-menu">
            <li><a class="dropdown-item" href="/inventory/export/products">Download Inventory CSV</a></li>
            <li><a class="dropdown-item" href="/inventory/export/orders">Download Orders CSV</a></li>
          </ul>
        </div>
      </div>
      <div class="navbar-nav">
        <a class="nav-link text-white" href="/auth/logout">Logout</a>
      </div>
    </div>
  </nav>
  <div class="container mt-4">
    {% block content %}{% endblock %}
  </div>
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
  <script src="{{ url_for('static', filename='js/main.js') }}"></script>
</body>
</html>
